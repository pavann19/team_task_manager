<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Team Task Manager – Manage projects and tasks with role-based access." />
  <title>Team Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    /* Custom Animations */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

    /* Form Input Focus */
    input:focus, select:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5);
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

    /* Overdue highlight */
    .task-overdue {
      border-color: rgba(239, 68, 68, 0.4) !important;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.1), inset 0 0 15px rgba(239, 68, 68, 0.05);
    }
    .overdue-badge {
      background: rgba(127, 29, 29, 0.8); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.4);
      font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap;
    }

    /* Status Pills */
    .status-pending    { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
    .status-inprogress { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .status-completed  { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }

    /* Priority Pills */
    .priority-low    { background: rgba(107, 114, 128, 0.15); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
    .priority-medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .priority-high   { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

    /* Toast Notifications */
    .toast {
      position: fixed; top: 24px; right: 24px; z-index: 1000;
      padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
      animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; max-width: 90vw; width: 380px;
      backdrop-filter: blur(8px);
    }
    .toast-success { background: rgba(6, 95, 70, 0.9); color: #6ee7b7; border: 1px solid #059669; }
    .toast-error   { background: rgba(127, 29, 29, 0.9); color: #fca5a5; border: 1px solid #dc2626; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen overflow-x-hidden selection:bg-indigo-500/30 selection:text-indigo-200">

  <!-- Global Loader Overlay -->
  <div id="global-loader" class="hidden fixed inset-0 z-[200] bg-gray-950/60 backdrop-blur-md flex flex-col items-center justify-center transition-all duration-300">
    <div class="w-14 h-14 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
    <p class="mt-4 text-indigo-300 font-medium text-sm animate-pulse tracking-wide">Processing...</p>
  </div>

  <!-- ============ AUTH SCREEN ============ -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 lg:p-8">
    <div class="bg-white/5 backdrop-blur-lg border border-white/10 shadow-2xl rounded-3xl p-8 sm:p-10 w-full max-w-md slide-up transition-all duration-500">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 mb-4 shadow-inner shadow-indigo-500/20">
          <svg class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-br from-indigo-400 to-purple-400 bg-clip-text text-transparent">Team Task Manager</h1>
        <p class="text-gray-400 text-sm mt-2 font-medium">Organize. Assign. Deliver.</p>
      </div>

      <!-- Tab Toggle -->
      <div class="flex rounded-xl bg-gray-900/50 p-1 mb-8 shadow-inner">
        <button id="tab-login" onclick="switchAuthTab('login')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 ease-in-out bg-indigo-600 text-white shadow-md shadow-indigo-600/20">Login</button>
        <button id="tab-register" onclick="switchAuthTab('register')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 ease-in-out text-gray-400 hover:text-white hover:bg-gray-800/50">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Username</label>
          <input id="login-username" type="text" required placeholder="Enter username"
                 class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Password</label>
          <input id="login-password" type="password" required placeholder="Enter password"
                 class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80" />
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl text-sm transition-all duration-300 ease-in-out hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95 mt-2">
          Sign In
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" onsubmit="handleRegister(event)" class="space-y-5 hidden">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Username</label>
          <input id="reg-username" type="text" required minlength="3" placeholder="Choose username"
                 class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Email</label>
          <input id="reg-email" type="email" required placeholder="you@example.com"
                 class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Password</label>
          <input id="reg-password" type="password" required minlength="6" placeholder="Min 6 characters"
                 class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Role</label>
          <select id="reg-role" class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm transition-all duration-300 appearance-none hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900/80">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl text-sm transition-all duration-300 ease-in-out hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95 mt-2">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <!-- ============ MAIN DASHBOARD ============ -->
  <div id="dashboard" class="hidden min-h-screen flex flex-col">

    <!-- Top Nav -->
    <nav class="sticky top-0 z-40 bg-gray-950/80 backdrop-blur-md border-b border-white/10 shadow-sm transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center shadow-inner shadow-indigo-500/10">
            <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent hidden sm:block">TaskManager</span>
        </div>
        <div class="flex items-center gap-5">
          <div class="text-right hidden sm:block">
            <p id="nav-username" class="text-sm font-bold text-gray-100"></p>
            <p id="nav-role" class="text-xs text-indigo-400 font-medium"></p>
          </div>
          <button id="logout-btn" onclick="handleLogout()" class="bg-gray-800/80 hover:bg-gray-700 text-gray-200 text-xs font-semibold px-4 py-2.5 rounded-lg transition-all duration-300 ease-in-out hover:scale-105 active:scale-95 border border-white/5 hover:border-white/10 hover:shadow-md">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

      <!-- ===== ADMIN METRICS STRIP ===== -->
      <div id="analytics-strip" class="hidden mb-10 fade-in">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5">
          <span class="text-sm font-bold text-indigo-400 uppercase tracking-widest flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
            Live Metrics
          </span>
          <div class="hidden sm:block flex-1 h-px bg-gradient-to-r from-gray-800 to-transparent mx-4"></div>
          <button onclick="loadAnalytics()" class="text-xs font-semibold text-gray-500 hover:text-indigo-300 transition-colors duration-300 flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            Refresh
          </button>
        </div>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
          <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5 sm:p-6 transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-indigo-500/10 hover:border-indigo-500/30 group">
            <p class="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide group-hover:text-indigo-300 transition-colors">Total Tasks</p>
            <p id="m-total-tasks" class="text-3xl sm:text-4xl font-extrabold text-indigo-400 drop-shadow-md">—</p>
          </div>
          <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5 sm:p-6 transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-emerald-500/10 hover:border-emerald-500/30 group">
            <p class="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide group-hover:text-emerald-300 transition-colors">Completed</p>
            <p id="m-completed" class="text-3xl sm:text-4xl font-extrabold text-emerald-400 drop-shadow-md">—</p>
          </div>
          <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5 sm:p-6 transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-yellow-500/10 hover:border-yellow-500/30 group">
            <p class="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide group-hover:text-yellow-300 transition-colors">Pending</p>
            <p id="m-pending" class="text-3xl sm:text-4xl font-extrabold text-yellow-400 drop-shadow-md">—</p>
          </div>
          <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5 sm:p-6 transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-red-500/10 hover:border-red-500/30 group">
            <p class="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide group-hover:text-red-300 transition-colors">Overdue</p>
            <p id="m-overdue" class="text-3xl sm:text-4xl font-extrabold text-red-400 drop-shadow-md">—</p>
          </div>
        </div>
      </div>

      <!-- TAB BAR -->
      <div class="flex flex-wrap gap-3 mb-8">
        <button onclick="showSection('projects')" id="sec-btn-projects"
                class="flex-1 sm:flex-none px-6 py-3 rounded-xl text-sm font-bold transition-all duration-300 ease-in-out bg-indigo-600/20 text-indigo-300 border border-indigo-500/30 hover:scale-105 hover:shadow-lg hover:shadow-indigo-500/20">
          📁 Projects
        </button>
        <button onclick="showSection('tasks')" id="sec-btn-tasks"
                class="flex-1 sm:flex-none px-6 py-3 rounded-xl text-sm font-bold transition-all duration-300 ease-in-out text-gray-400 hover:text-white hover:bg-gray-800/80 border border-transparent hover:border-gray-700 hover:scale-105">
          ✅ Tasks
        </button>
      </div>

      <!-- ===== PROJECTS SECTION ===== -->
      <section id="section-projects" class="fade-in">
        <div id="create-project-box" class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 sm:p-8 mb-8 hidden shadow-lg">
          <h2 class="text-xl font-bold mb-5 flex items-center gap-2"><span class="text-indigo-400 bg-indigo-500/20 w-8 h-8 rounded-lg flex items-center justify-center">+</span> Create Project</h2>
          <form id="project-form" onsubmit="handleCreateProject(event)" class="flex flex-col md:flex-row gap-4">
            <input id="proj-name" type="text" required placeholder="Project Name"
                   class="flex-1 bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-500 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900" />
            <input id="proj-desc" type="text" placeholder="Short Description (Optional)"
                   class="flex-1 lg:flex-[2] bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-500 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900" />
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-3.5 rounded-xl text-sm transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95 whitespace-nowrap">Create</button>
          </form>
        </div>
        <div id="project-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 lg:gap-6"></div>
        <div id="no-projects" class="hidden text-center bg-white/5 border border-white/5 rounded-2xl py-16 px-4">
          <p class="text-gray-400 text-lg font-medium">No projects found. Create one to get started.</p>
        </div>
      </section>

      <!-- ===== TASKS SECTION ===== -->
      <section id="section-tasks" class="hidden fade-in">
        <!-- Create Task (Admin) -->
        <div id="create-task-box" class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 sm:p-8 mb-8 hidden shadow-lg">
          <h2 class="text-xl font-bold mb-5 flex items-center gap-2"><span class="text-indigo-400 bg-indigo-500/20 w-8 h-8 rounded-lg flex items-center justify-center">+</span> Create Task</h2>
          <form id="task-form" onsubmit="handleCreateTask(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <input id="task-title" type="text" required placeholder="Task Title"
                   class="lg:col-span-2 bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-500 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900" />
            <select id="task-project" required
                    class="bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm transition-all duration-300 appearance-none hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900">
              <option value="">Select Project</option>
            </select>
            <input id="task-desc" type="text" placeholder="Detailed Description (Optional)"
                   class="lg:col-span-3 bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm placeholder-gray-500 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900" />
            <select id="task-assignee"
                    class="bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm transition-all duration-300 appearance-none hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900">
              <option value="">Unassigned</option>
            </select>
            <select id="task-priority"
                    class="bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm transition-all duration-300 appearance-none hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900">
              <option value="Low">🟢 Low Priority</option>
              <option value="Medium" selected>🟡 Medium Priority</option>
              <option value="High">🔴 High Priority</option>
            </select>
            <input id="task-due-date" type="date"
                   class="bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3.5 text-sm text-gray-300 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500 focus:bg-gray-900" />
            <button type="submit" class="lg:col-span-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl text-sm transition-all duration-300 ease-in-out hover:scale-[1.01] hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95 mt-2">
              Create Task
            </button>
          </form>
        </div>

        <!-- Filter -->
        <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 mb-6 bg-gray-900/40 p-4 rounded-xl border border-white/5">
          <label class="text-xs text-gray-400 font-bold uppercase tracking-widest whitespace-nowrap">Filter Tasks:</label>
          <select id="task-filter-project" onchange="loadTasks()"
                  class="w-full sm:w-64 bg-gray-800/80 border border-gray-700/50 rounded-lg px-4 py-2.5 text-sm font-medium transition-all duration-300 appearance-none hover:border-indigo-500 focus:border-indigo-500">
            <option value="">All Projects</option>
          </select>
        </div>

        <div id="task-list" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        <div id="no-tasks" class="hidden text-center bg-white/5 border border-white/5 rounded-2xl py-16 px-4">
          <p class="text-gray-400 text-lg font-medium">No tasks found. Time to relax.</p>
        </div>
      </section>

    </main>
  </div>

  <!-- ============ UPDATE TASK MODAL ============ -->
  <div id="update-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-gray-950/80 backdrop-blur-md transition-all duration-300 p-4">
    <div class="bg-gray-900 border border-white/10 shadow-2xl rounded-3xl p-6 sm:p-8 w-full max-w-lg slide-up overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-xl font-bold">Update Task Status</h2>
          <p id="modal-task-title" class="text-sm text-indigo-400 mt-1 font-medium truncate max-w-[250px] sm:max-w-sm"></p>
        </div>
        <button onclick="closeModal()" class="text-gray-500 hover:text-white transition-colors bg-gray-800 hover:bg-gray-700 rounded-full p-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      
      <form id="update-task-form" onsubmit="handleUpdateTask(event)" class="space-y-5">
        <input type="hidden" id="update-task-id" />
        
        <div class="bg-gray-800/50 p-4 rounded-xl border border-white/5">
          <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wide">Task Status</label>
          <select id="update-status" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3.5 text-sm transition-all duration-300 appearance-none focus:border-indigo-500 font-semibold shadow-inner">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <!-- Admin-only fields -->
        <div id="admin-update-fields" class="space-y-4 border-t border-gray-800 pt-5 mt-2">
          <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-3">Admin Overrides</h3>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Title</label>
            <input id="update-title" type="text"
                   class="w-full bg-gray-900/80 border border-gray-700/80 rounded-xl px-4 py-3 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Description</label>
            <input id="update-desc" type="text"
                   class="w-full bg-gray-900/80 border border-gray-700/80 rounded-xl px-4 py-3 text-sm placeholder-gray-600 transition-all duration-300 hover:border-gray-600 focus:border-indigo-500" />
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Priority</label>
              <select id="update-priority" class="w-full bg-gray-900/80 border border-gray-700/80 rounded-xl px-4 py-3 text-sm transition-all duration-300 appearance-none focus:border-indigo-500">
                <option value="Low">🟢 Low</option>
                <option value="Medium">🟡 Medium</option>
                <option value="High">🔴 High</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Due Date</label>
              <input id="update-due-date" type="date"
                     class="w-full bg-gray-900/80 border border-gray-700/80 rounded-xl px-4 py-3 text-sm text-gray-300 transition-all duration-300 focus:border-indigo-500" />
            </div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-800">
          <button type="submit" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl text-sm transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95">Save Changes</button>
          <button type="button" onclick="closeModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-3.5 rounded-xl text-sm transition-all duration-300 hover:scale-105">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
